<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradiente Instagram -->
  <defs>
    <linearGradient id="instaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#feda75"></stop>
      <stop offset="30%" stop-color="#fa7e1e"></stop>
      <stop offset="60%" stop-color="#d62976"></stop>
      <stop offset="80%" stop-color="#962fbf"></stop>
      <stop offset="100%" stop-color="#4f5bd5"></stop>
    </linearGradient>
  </defs>

  <!-- Ícone Instagram -->
  <g transform="translate(60,50)">
    <rect x="0" y="0" width="200" height="200" rx="45" fill="url(#instaGradient)"></rect>
    <rect x="50" y="50" width="100" height="100" rx="30" fill="none" stroke="#ffffff" stroke-width="12"></rect>
    <circle cx="100" cy="100" r="34" fill="none" stroke="#ffffff" stroke-width="12"></circle>
    <circle cx="145" cy="55" r="10" fill="#ffffff"></circle>
  </g>

  <!-- Texto principal -->
  <text x="300" y="135" font-size="60" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#000000">
    Lus
  </text>

  <!-- Texto secundário -->
  <text x="300" y="205" font-size="52" font-weight="600" font-family="Arial, Helvetica, sans-serif" fill="url(#instaGradient)">
    Engajamento
  </text>

  <!-- Slogan -->
  <text x="300" y="245" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#555555">
    Crescimento • Alcance • Autoridade
  </text>
</svg>
